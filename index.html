<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPA Archive | Genius Society</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --herta-dark: #12121e;
            --herta-purple: #9d72d2;
            --ruan-teal: #64c4bc;
            --glass: rgba(255, 255, 255, 0.07);
            --glass-border: rgba(255, 255, 255, 0.12);
            --text-main: #eef2f3;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        body { 
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Running Text */
        .marquee-container {
            background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(8px);
            border-bottom: 1px solid var(--glass-border); padding: 12px 0; overflow: hidden;
        }
        .marquee-inner {
            display: inline-block; animation: scroll 30s linear infinite;
            font-weight: 700; color: var(--ruan-teal); letter-spacing: 2px; font-size: 0.8rem;
        }

        .container { max-width: 1000px; margin: auto; padding: 20px; text-align: center; }
        header h1 { font-size: 2.5rem; margin-top: 20px; font-weight: 800; color: white; }
        header span { color: var(--ruan-teal); }

        /* Menu Grid */
        .btn-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-top: 30px; }
        .menu-card {
            background: var(--glass); border: 1px solid var(--glass-border); padding: 40px 20px;
            border-radius: 20px; cursor: pointer; transition: 0.3s; font-weight: 800; backdrop-filter: blur(10px);
        }
        .menu-card:hover { border-color: var(--herta-purple); background: rgba(157, 114, 210, 0.15); transform: translateY(-5px); }

        /* Task Cards */
        .card-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; margin-top: 40px; }
        .card {
            background: var(--glass); border-radius: 22px; overflow: hidden; border: 1px solid var(--glass-border);
            text-align: left; transition: 0.3s;
        }
        .card:hover { transform: scale(1.02); border-color: var(--ruan-teal); }

        .img-box { position: relative; height: 220px; background: #000; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; cursor: pointer; }
        .nav-btn {
            position: absolute; top: 50%; transform: translateY(-50%);
            background: rgba(0,0,0,0.4); border: none; width: 35px; height: 35px;
            border-radius: 50%; color: white; cursor: pointer;
        }

        .card-body { padding: 20px; }
        .tag { font-size: 0.7rem; font-weight: 800; color: var(--ruan-teal); display: block; margin-bottom: 10px; }
        .pdf-btn {
            display: block; margin-top: 15px; padding: 10px; text-align: center;
            background: var(--herta-purple); color: white; text-decoration: none; border-radius: 10px;
            font-size: 0.8rem; font-weight: 800;
        }

        /* Modal / Fullscreen Foto */
        #lightbox {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 10000;
            display: none; justify-content: center; align-items: center; cursor: pointer;
        }
        #lightbox img { max-width: 90%; max-height: 90%; border-radius: 10px; }

        /* Comment Internal Box */
        .comment-box {
            background: var(--glass); border: 1px solid var(--glass-border);
            padding: 25px; border-radius: 25px; margin-top: 50px; text-align: left;
        }
        .comment-box input, .comment-box textarea {
            width: 100%; padding: 12px; margin-top: 10px; border-radius: 10px;
            border: 1px solid var(--glass-border); background: rgba(255,255,255,0.05); color: white;
        }
        .submit-btn {
            background: var(--ruan-teal); border: none; padding: 12px 25px; 
            border-radius: 10px; margin-top: 15px; font-weight: 800; cursor: pointer;
        }

        /* Floating UI */
        .floating { position: fixed; bottom: 25px; right: 25px; display: flex; flex-direction: column; gap: 15px; }
        .f-btn {
            width: 55px; height: 55px; border-radius: 50%; border: none; 
            cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.3rem;
        }
        .music-btn { background: var(--herta-purple); color: white; }
        .comment-btn { background: var(--ruan-teal); color: white; animation: blink 2s infinite; }

        @keyframes scroll { from { transform: translateX(100%); } to { transform: translateX(-100%); } }
        @keyframes blink { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.8; transform: scale(1.1); } }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="marquee-container">
    <div class="marquee-inner" id="marqueeText">MENGUMPULKAN DATA IPA... SILAKAN PILIH KELAS...</div>
</div>

<div class="container">
    <header><h1>IPA<span>ARCHIVE</span></h1></header>

    <!-- Menu 1 -->
    <div id="v-kelas">
        <h3 style="margin:20px 0">Pilih Kelas</h3>
        <div class="btn-grid">
            <div class="menu-card" onclick="setKelas('10')">KELAS 10</div>
            <div class="menu-card" onclick="setKelas('11')">KELAS 11</div>
            <div class="menu-card" onclick="setKelas('12')">KELAS 12</div>
        </div>
    </div>

    <!-- Menu 2 -->
    <div id="v-mapel" class="hidden">
        <p onclick="showV('v-kelas')" style="cursor:pointer; color:var(--ruan-teal)">← Kembali</p>
        <h3 style="margin:20px 0">Pilih Mapel</h3>
        <div class="btn-grid">
            <div class="menu-card" onclick="setMapel('Biologi')">BIOLOGI</div>
            <div class="menu-card" onclick="setMapel('Kimia')">KIMIA</div>
            <div class="menu-card" onclick="setMapel('Fisika')">FISIKA</div>
        </div>
    </div>

    <!-- Menu 3 -->
    <div id="v-semester" class="hidden">
        <p onclick="showV('v-mapel')" style="cursor:pointer; color:var(--ruan-teal)">← Kembali</p>
        <h3 style="margin:20px 0">Pilih Semester</h3>
        <div class="btn-grid">
            <div class="menu-card" onclick="loadTasks('1')">SEMESTER 1</div>
            <div class="menu-card" onclick="loadTasks('2')">SEMESTER 2</div>
        </div>
    </div>

    <!-- Data View -->
    <div id="v-data" class="hidden">
        <p onclick="showV('v-semester')" style="cursor:pointer; color:var(--ruan-teal)">← Kembali</p>
        <div class="card-container" id="grid"></div>

        <!-- Custom Comment Form -->
        <div class="comment-box" id="komen-area">
            <h4>Berikan Masukan</h4>
            <input type="text" id="nama" placeholder="Nama Kamu">
            <textarea id="pesan" rows="4" placeholder="Masukan atau saran..."></textarea>
            <button class="submit-btn" onclick="sendKomen()">KIRIM MASUKAN</button>
            <p id="msg" style="margin-top:10px; font-size:0.8rem;"></p>
        </div>
    </div>
</div>

<!-- Fullscreen Foto (Modal) -->
<div id="lightbox" onclick="this.style.display='none'"><img id="lbox-img"></div>

<div class="floating">
    <button class="f-btn music-btn" onclick="playM()" id="mIcon">🎵</button>
    <button class="f-btn comment-btn" onclick="document.getElementById('komen-area').scrollIntoView()">💬</button>
</div>

<audio id="bgm" loop src="pasilyo.mp3"></audio>

<script>
    let cur = { k: '', m: '', s: '' };
    const csv = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRyJ4VihwGxpbpxQfSDKMb5AiPVmY1-wFviOWyEjfsuljcLPXUypWMNVDakdmM-58m31gNBNydwGSEe/pub?output=csv';

    function showV(id) {
        document.querySelectorAll('.container > div:not(header)').forEach(d => d.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }

    function setKelas(k) { cur.k = k; showV('v-mapel'); document.getElementById('bgm').play().catch(()=>{}); }
    function setMapel(m) { cur.m = m; showV('v-semester'); document.getElementById('marqueeText').innerText = `SUBJECT: ${m} | KELAS: ${cur.k}`; }

    function loadTasks(s) {
        cur.s = s;
        showV('v-data');
        const grid = document.getElementById('grid');
        grid.innerHTML = 'Memuat memori...';

        Papa.parse(csv, {
            download: true, header: true,
            complete: function(res) {
                const data = res.data.filter(r => r.Kelas == cur.k && r.Mapel.trim() == cur.m && r.Semester == cur.s);
                grid.innerHTML = '';
                if(data.length === 0) { grid.innerHTML = 'Data tidak ditemukan.'; return; }

                data.forEach((item, i) => {
                    const imgs = item['URL Foto'].split(',');
                    const tgl = item.Tanggal || 'N/A';
                    let desc = item.Deskripsi || '';
                    let pdf = '';

                    if(desc.toLowerCase().includes('.pdf')) {
                        const link = desc.match(/https?:\/\/[^\s]+/);
                        if(link) { pdf = `<a href="${link[0]}" target="_blank" class="pdf-btn">BUKA PDF</a>`; desc = desc.replace(link[0], ''); }
                    }

                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <div class="img-box" id="img-${i}">
                            <img src="${imgs[0]}" onclick="openFull('${imgs[0]}')">
                            ${imgs.length > 1 ? `
                                <button class="nav-btn" style="left:5px" onclick="slide('${i}', '${item['URL Foto']}', -1)">❮</button>
                                <button class="nav-btn" style="right:5px" onclick="slide('${i}', '${item['URL Foto']}', 1)">❯</button>
                            ` : ''}
                        </div>
                        <div class="card-body">
                            <span class="tag">${tgl}</span>
                            <strong style="display:block;margin-bottom:5px">${item['Nama Tugas']}</strong>
                            <p style="font-size:0.8rem; color:#bbb">${desc}</p>
                            ${pdf}
                        </div>
                    `;
                    grid.appendChild(card);
                });
            }
        });
    }

    function slide(id, str, dir) {
        const img = document.querySelector(`#img-${id} img`);
        const arr = str.split(',');
        let idx = arr.indexOf(img.getAttribute('src'));
        let n = (idx + dir + arr.length) % arr.length;
        img.src = arr[n];
    }

    function openFull(src) {
        document.getElementById('lbox-img').src = src;
        document.getElementById('lightbox').style.display = 'flex';
    }

    // FITUR KOMEN INVISIBLE (Lewat Google Form belakang layar)
    function sendKomen() {
        const nama = document.getElementById('nama').value;
        const pesan = document.getElementById('pesan').value;
        const msg = document.getElementById('msg');

        if(!nama || !pesan) { alert('Isi nama dan pesan ya!'); return; }

        msg.innerText = 'Mengirim masukan...';

        // Ganti ID Entry sesuai dengan Google Form kamu (sudah disesuaikan dengan prefilled mu)
        const formID = "1FAIpQLSc3EBonvoYp1r3EWmLQaghElqYEtamv4xAmghbGJN3bC-eLrQ";
        const url = `https://docs.google.com/forms/d/e/${formID}/formResponse`;
        
        const formData = new FormData();
        formData.append('entry.1078328655', cur.k); // Kelas
        formData.append('entry.1470795916', cur.m); // Mapel
        formData.append('entry.1054739972', `Semester ${cur.s}`); // Semester
        formData.append('entry.1470795916', nama); // Bisa kamu ganti entry ID untuk Nama jika ada
        formData.append('entry.1054739972', pesan); // Bisa kamu ganti entry ID untuk Pesan

        // Mengirim data menggunakan No-Cors mode (karena Google Form membatasi cors)
        fetch(url, {
            method: 'POST',
            mode: 'no-cors',
            body: formData
        }).then(() => {
            msg.style.color = 'var(--ruan-teal)';
            msg.innerText = 'Masukan berhasil dikirim! (Cek Google Sheets kamu)';
            document.getElementById('nama').value = '';
            document.getElementById('pesan').value = '';
        }).catch(() => {
            msg.innerText = 'Gagal mengirim. Tapi coba cek Sheets kamu.';
        });
    }

    function playM() {
        const b = document.getElementById('bgm');
        if(b.paused) { b.play(); document.getElementById('mIcon').innerText = '⏸'; }
        else { b.pause(); document.getElementById('mIcon').innerText = '🎵'; }
    }
</script>

</body>
</html>

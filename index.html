<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPA Archive - Herta & Ruan Mei</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --herta-purple: #7d5ba6;
            --ruan-mei-teal: #a8dadc;
            --space-dark: #0f0f1a;
            --glass: rgba(255, 255, 255, 0.08);
            --accent: #ff79c6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        body {
            background: linear-gradient(135deg, #0f0f1a 0%, #1b1128 100%);
            color: #e0e0e0;
            min-height: 100vh;
            overflow-x: hidden;
        }

        #loading {
            position: fixed; inset: 0; background: var(--space-dark);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 9999; transition: opacity 0.6s;
        }
        .loader-orbit {
            width: 80px; height: 80px;
            border: 2px solid var(--herta-purple);
            border-radius: 50%;
            border-top-color: var(--ruan-mei-teal);
            animation: spin 1s linear infinite;
        }

        .marquee-container {
            background: rgba(125, 91, 166, 0.15);
            padding: 8px 0; overflow: hidden; white-space: nowrap;
            border-bottom: 1px solid var(--herta-purple);
        }
        .marquee-text {
            display: inline-block; animation: scroll 25s linear infinite;
            font-weight: 600; letter-spacing: 1.5px; color: var(--ruan-mei-teal);
            text-transform: uppercase; font-size: 0.8rem;
        }

        .container { max-width: 1100px; margin: auto; padding: 20px; text-align: center; min-height: 80vh; }
        .quote { font-style: italic; color: #888; margin: 15px 0 30px; font-size: 0.85rem; line-height: 1.5; }
        
        h2 { color: var(--ruan-mei-teal); margin-bottom: 25px; font-weight: 800; letter-spacing: 1px; }

        .btn-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; margin-top: 10px; }
        .btn {
            background: var(--glass); border: 1px solid rgba(125, 91, 166, 0.4);
            padding: 20px; color: white; cursor: pointer; border-radius: 12px;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(8px); font-weight: 600;
        }
        .btn:hover { background: var(--herta-purple); transform: translateY(-5px); border-color: var(--ruan-mei-teal); }

        .card-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 30px; }
        .card {
            background: rgba(255, 255, 255, 0.03); border-radius: 16px; overflow: hidden;
            border: 1px solid rgba(168, 218, 220, 0.1); transition: 0.3s;
        }
        .card:hover { border-color: var(--ruan-mei-teal); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        .carousel { position: relative; height: 220px; background: #000; overflow: hidden; }
        .carousel img { width: 100%; height: 100%; object-fit: cover; cursor: zoom-in; }
        .carousel-btn {
            position: absolute; top: 50%; transform: translateY(-50%);
            background: rgba(0,0,0,0.6); color: white; border: none; 
            width: 35px; height: 35px; cursor: pointer; border-radius: 50%;
        }

        .card-content { padding: 18px; text-align: left; }
        .date-tag { font-size: 0.75rem; color: var(--ruan-mei-teal); background: rgba(168, 218, 220, 0.1); padding: 2px 8px; border-radius: 4px; }
        .pdf-btn {
            display: inline-block; margin-top: 12px; padding: 10px 18px;
            background: #ff4d4d; color: white; text-decoration: none; border-radius: 8px; 
            font-size: 0.8rem; font-weight: bold; transition: 0.3s;
        }
        .pdf-btn:hover { background: #ff79c6; transform: scale(1.05); }

        .floating-controls { position: fixed; bottom: 25px; right: 25px; display: flex; flex-direction: column; gap: 15px; z-index: 1000; }
        .float-btn {
            width: 55px; height: 55px; border-radius: 50%; border: none;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 5px 20px rgba(0,0,0,0.4); transition: 0.3s; font-size: 1.2rem;
        }
        .btn-music { background: var(--herta-purple); color: white; }
        .btn-comment { background: var(--ruan-mei-teal); animation: blink 2s infinite; color: #12121e; }

        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes scroll { from { transform: translateX(100%); } to { transform: translateX(-100%); } }
        @keyframes blink { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.8; transform: scale(1.1); box-shadow: 0 0 25px var(--ruan-mei-teal); } }

        #overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            display: none; justify-content: center; align-items: center; z-index: 10000; cursor: zoom-out;
        }
        #overlay img { max-width: 95%; max-height: 95%; border-radius: 8px; }

        .hidden { display: none; }
        .back-btn { background: none; border: none; color: var(--ruan-mei-teal); cursor: pointer; margin-bottom: 15px; display: flex; align-items: center; gap: 5px; }
    </style>
</head>
<body>

<div id="loading">
    <div class="loader-orbit"></div>
    <p style="margin-top: 20px; color: var(--ruan-mei-teal); letter-spacing: 2px; font-size: 0.7rem;">LOADING DATA SIMULATION...</p>
</div>

<div class="marquee-container" id="marqueeBox">
    <div class="marquee-text" id="runningText">
        BIOLOGI — KIMIA — FISIKA — GENIUS SOCIETY — KNOWLEDGE IS THE ONLY CURRENCY — HERTA — RUAN MEI — BIOLOGI — KIMIA — FISIKA
    </div>
</div>

<div class="container">
    <h1 style="margin-top: 20px; font-weight: 800; font-size: 2.5rem;"><span style="color:var(--ruan-mei-teal)">IPA</span><span style="color:var(--herta-purple)"> ARCHIVE</span></h1>
    <div class="quote" id="dynamicQuote">"I have no interest in ordinary things. Show me the results of your 'hard work'." - Herta</div>

    <!-- Step 1: Kelas -->
    <div id="step-kelas">
        <h2>SELECT GRADE</h2>
        <div class="btn-grid">
            <button class="btn" onclick="selectKelas('10')">CLASS 10</button>
            <button class="btn" onclick="selectKelas('11')">CLASS 11</button>
            <button class="btn" onclick="selectKelas('12')">CLASS 12</button>
        </div>
    </div>

    <!-- Step 2: Mapel -->
    <div id="step-mapel" class="hidden">
        <button class="back-btn" onclick="goBack('step-kelas')">← BACK</button>
        <h2>RESEARCH SUBJECT</h2>
        <div class="btn-grid">
            <button class="btn" onclick="selectMapel('Biologi')">BIOLOGI</button>
            <button class="btn" onclick="selectMapel('Kimia')">KIMIA</button>
            <button class="btn" onclick="selectMapel('Fisika')">FISIKA</button>
        </div>
    </div>

    <!-- Step 3: Semester -->
    <div id="step-semester" class="hidden">
        <button class="back-btn" onclick="goBack('step-mapel')">← BACK</button>
        <h2>TIME CYCLE</h2>
        <div class="btn-grid">
            <button class="btn" onclick="loadData('1')">SEMESTER 1</button>
            <button class="btn" onclick="loadData('2')">SEMESTER 2</button>
        </div>
    </div>

    <!-- Step 4: Cards Display -->
    <div id="display-area" class="hidden">
        <button class="back-btn" onclick="goBack('step-semester')">← BACK TO SEMESTER</button>
        <div class="card-container" id="cards-grid"></div>
    </div>
</div>

<div class="floating-controls">
    <button class="float-btn btn-music" onclick="toggleMusic()" id="musicToggle">▶</button>
    <button class="float-btn btn-comment" onclick="openComment()">💬</button>
</div>

<div id="overlay" onclick="this.style.display='none'"><img id="overlayImg" src=""></div>

<audio id="bgm" loop>
    <source src="pasilyo.mp3" type="audio/mpeg">
</audio>

<script>
    let selection = { kelas: '', mapel: '', semester: '' };
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRyJ4VihwGxpbpxQfSDKMb5AiPVmY1-wFviOWyEjfsuljcLPXUypWMNVDakdmM-58m31gNBNydwGSEe/pub?output=csv';
    const bgm = document.getElementById('bgm');
    bgm.volume = 0.2;

    window.onload = () => {
        setTimeout(() => {
            document.getElementById('loading').style.opacity = '0';
            setTimeout(() => document.getElementById('loading').style.display = 'none', 600);
        }, 1200);
    };

    function selectKelas(k) {
        selection.kelas = k;
        document.getElementById('step-kelas').classList.add('hidden');
        document.getElementById('step-mapel').classList.remove('hidden');
        document.getElementById('dynamicQuote').innerText = '"Everything is predetermined by life... or by me." - Ruan Mei';
        bgm.play();
        document.getElementById('musicToggle').innerText = '⏸';
    }

    function selectMapel(m) {
        selection.mapel = m;
        document.getElementById('step-mapel').classList.add('hidden');
        document.getElementById('step-semester').classList.remove('hidden');
        document.getElementById('runningText').innerText = `${m} DATA ACQUISITION — GRADE ${selection.kelas} — ACCESSING MEMORY BUBBLES — ${m}`;
    }

    function loadData(s) {
        selection.semester = s;
        document.getElementById('step-semester').classList.add('hidden');
        document.getElementById('display-area').classList.remove('hidden');
        
        Papa.parse(csvUrl, {
            download: true,
            header: true,
            complete: function(results) {
                renderCards(results.data);
            }
        });
    }

    function renderCards(data) {
        const grid = document.getElementById('cards-grid');
        grid.innerHTML = '';
        
        const filtered = data.filter(row => 
            row.kelas == selection.kelas && 
            row.mapel.trim().toLowerCase() == selection.mapel.toLowerCase() && 
            row.semester == selection.semester
        );

        if(filtered.length === 0) {
            grid.innerHTML = `<div style="grid-column: 1/-1; padding: 50px; color: #666;">Data tidak ditemukan dalam simulasi ini.</div>`;
            return;
        }

        filtered.forEach((item, index) => {
            const photoList = item.foto.split(',');
            const date = item.tanggal && item.tanggal.trim() !== "" ? item.tanggal : "N/A";
            let description = item.deskripsi || "";
            let actionBtn = "";

            // PDF Logic
            if (description.toLowerCase().includes('.pdf')) {
                const urlMatch = description.match(/https?:\/\/[^\s]+/);
                if (urlMatch) {
                    actionBtn = `<a href="${urlMatch[0]}" target="_blank" class="pdf-btn">BUKA DOKUMEN</a>`;
                    description = description.replace(urlMatch[0], "");
                }
            }

            const card = document.createElement('div');
            card.className = 'card';
            const carouselId = `carousel-${index}`;

            card.innerHTML = `
                <div class="carousel" id="${carouselId}">
                    <img src="${photoList[0]}" onclick="viewFull('${photoList[0]}')">
                    ${photoList.length > 1 ? `
                        <button class="carousel-btn" style="left:5px" onclick="moveCarousel('${carouselId}', '${item.foto}', -1)">❮</button>
                        <button class="carousel-btn" style="right:5px" onclick="moveCarousel('${carouselId}', '${item.foto}', 1)">❯</button>
                    ` : ''}
                </div>
                <div class="card-content">
                    <span class="date-tag">${date}</span>
                    <h3 style="margin: 10px 0 5px; color: var(--herta-purple); font-size: 1.1rem;">${item.judul || 'Untitled Project'}</h3>
                    <p style="font-size: 0.85rem; color: #bbb; line-height: 1.4;">${description}</p>
                    ${actionBtn}
                </div>
            `;
            grid.appendChild(card);
        });
    }

    function moveCarousel(cid, photoStr, dir) {
        const container = document.getElementById(cid);
        const img = container.querySelector('img');
        const photos = photoStr.split(',');
        let currentSrc = img.src;
        // Handle full URL vs relative URL issues by finding index correctly
        let currentIdx = photos.findIndex(p => p.trim() === currentSrc || currentSrc.includes(p.trim()));
        let nextIdx = (currentIdx + dir + photos.length) % photos.length;
        img.src = photos[nextIdx].trim();
    }

    function viewFull(src) {
        const overlay = document.getElementById('overlay');
        document.getElementById('overlayImg').src = src;
        overlay.style.display = 'flex';
    }

    function goBack(id) {
        document.querySelectorAll('.container > div:not(.quote)').forEach(div => div.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }

    function toggleMusic() {
        if (bgm.paused) { bgm.play(); document.getElementById('musicToggle').innerText = '⏸'; }
        else { bgm.pause(); document.getElementById('musicToggle').innerText = '▶'; }
    }

    function openComment() {
        // Pre-filled Google Form Link
        const formLink = `https://docs.google.com/forms/d/e/1FAIpQLSc3EBonvoYp1r3EWmLQaghElqYEtamv4xAmghbGJN3bC-eLrQ/viewform?usp=pp_url&entry.1078328655=${selection.kelas}&entry.1470795916=${selection.mapel}&entry.1054739972=Semester+${selection.semester}`;
        window.open(formLink, '_blank');
    }
</script>
</body>
</html>

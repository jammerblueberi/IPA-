<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPA | Research Archive</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #7e57c2; /* Ungu Herta */
            --accent: #26a69a; /* Hijau Ruan Mei */
            --bg: #f8f9ff; 
            --text: #2c3e50; 
        }

        * { box-sizing: border-box; transition: all 0.3s ease; }
        body { 
            margin: 0; 
            font-family: 'Quicksand', sans-serif; 
            background: linear-gradient(135deg, #f3e5f5 0%, #e0f2f1 100%); 
            color: var(--text); 
            min-height: 100vh;
        }

        /* --- FIX RUNNING TEXT (MARQUEE) --- */
        .marquee-wrapper {
            width: 100%;
            background: rgba(126, 87, 194, 0.9);
            color: white;
            padding: 10px 0;
            overflow: hidden;
            position: relative;
        }
        .marquee-text {
            display: inline-block;
            white-space: nowrap;
            animation: scroll-text 20s linear infinite;
            font-weight: 600;
            font-size: 0.9rem;
        }
        @keyframes scroll-text {
            0% { transform: translateX(100vw); }
            100% { transform: translateX(-100%); }
        }

        /* --- LAYOUT --- */
        .section { min-height: 100vh; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }
        .active { display: flex; animation: fadeIn 0.6s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        h1 { font-size: 2.2rem; color: var(--primary); margin-bottom: 30px; letter-spacing: -1px; }

        .btn-grid { display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; }
        .nav-btn { 
            padding: 15px 30px; 
            border: 2px solid var(--accent); 
            border-radius: 15px; 
            background: white; 
            color: var(--text); 
            font-weight: 700; 
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .nav-btn:hover { background: var(--accent); color: white; transform: translateY(-3px); }

        /* --- CARDS & SLIDER --- */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); 
            gap: 25px; 
            width: 100%; 
            max-width: 1100px; 
            padding: 20px; 
        }
        .card { 
            background: rgba(255, 255, 255, 0.9); 
            border-radius: 20px; 
            overflow: hidden; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.08); 
            border: 1px solid rgba(255,255,255,0.3);
            backdrop-filter: blur(10px);
        }
        .slider-container { position: relative; width: 100%; height: 220px; overflow: hidden; background: #eee; }
        .slider-wrapper { display: flex; transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1); height: 100%; }
        .slider-wrapper img { width: 100%; height: 100%; object-fit: cover; flex-shrink: 0; }
        
        .slider-btn { 
            position: absolute; top: 50%; transform: translateY(-50%); 
            background: rgba(255,255,255,0.7); border: none; 
            width: 35px; height: 35px; border-radius: 50%; cursor: pointer; z-index: 5;
        }
        .img-counter { 
            position: absolute; bottom: 10px; right: 10px; 
            background: rgba(0,0,0,0.5); color: white; 
            padding: 3px 10px; border-radius: 12px; font-size: 0.7rem; 
        }

        .card-body { padding: 20px; }
        .card-body b { color: var(--primary); font-size: 1.1rem; display: block; margin-bottom: 8px; }

        /* --- AESTHETIC FLOATING BUTTON --- */
        .fab { 
            position: fixed; bottom: 25px; right: 25px; 
            width: 55px; height: 55px; background: var(--primary); 
            color: white; border-radius: 50%; display: flex; 
            align-items: center; justify-content: center; 
            cursor: pointer; box-shadow: 0 8px 20px rgba(126,87,194,0.4); 
            z-index: 1000; border: none; font-size: 20px;
        }
        .modal { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.6); 
            display: none; justify-content: center; align-items: center; z-index: 2000;
            backdrop-filter: blur(4px);
        }
        .modal-box { 
            background: white; padding: 30px; border-radius: 24px; 
            width: 90%; max-width: 380px; text-align: left;
        }
        .modal-box input, .modal-box textarea { 
            width: 100%; padding: 12px; margin: 10px 0; 
            border: 1px solid #ddd; border-radius: 12px; font-family: inherit;
        }
    </style>
</head>
<body>

    <div class="marquee-wrapper">
        <div class="marquee-text" id="marquee">Memuat data dari pusat arsip... Silakan tunggu sebentar.</div>
    </div>

    <section id="step-1" class="section active">
        <h1>Arsip Penelitian IPA</h1>
        <div class="btn-grid">
            <button class="nav-btn" onclick="chooseMapel('Biologi')">🧬 Biologi</button>
            <button class="nav-btn" onclick="chooseMapel('Fisika')">⚡ Fisika</button>
            <button class="nav-btn" onclick="chooseMapel('Kimia')">🧪 Kimia</button>
        </div>
    </section>

    <section id="step-2" class="section">
        <h1 id="header-mapel">Mata Pelajaran</h1>
        <div class="btn-grid">
            <button class="nav-btn" onclick="setKelas('10')">Level 10</button>
            <button class="nav-btn" onclick="setKelas('11')">Level 11</button>
            <button class="nav-btn" onclick="setKelas('12')">Level 12</button>
        </div>
    </section>

    <section id="step-3" class="section">
        <h1>Pilih Semester</h1>
        <div class="btn-grid">
            <button class="nav-btn" onclick="render('1')">Semester 1</button>
            <button class="nav-btn" onclick="render('2')">Semester 2</button>
        </div>
    </section>

    <section id="step-4" class="section" style="justify-content: flex-start;">
        <h1 id="header-final">Data Hasil Scan</h1>
        <div class="grid" id="display-grid"></div>
        <button class="nav-btn" onclick="location.reload()" style="margin-top:20px;">Kembali</button>
    </section>

    <button class="fab" onclick="toggleModal(true)">💬</button>

    <div id="fb-modal" class="modal">
        <div class="modal-box">
            <h3 style="margin:0; color:var(--primary)">Saran & Masukan</h3>
            <p style="font-size:0.8rem; color:#666;">Ada tugas yang salah atau kurang? Beritahu kami.</p>
            <input type="text" id="nama" placeholder="Nama Anda">
            <textarea id="pesan" rows="4" placeholder="Tulis masukan di sini..."></textarea>
            <button onclick="sendFeedback()" id="btn-submit" style="width:100%; padding:12px; background:var(--primary); color:white; border:none; border-radius:12px; font-weight:700; cursor:pointer;">Kirim Masukan</button>
            <center><p onclick="toggleModal(false)" style="color:red; cursor:pointer; font-size:0.8rem; margin-top:15px;">Tutup</p></center>
        </div>
    </div>

    <script>
        // PAKAI LINK BARU YANG ANDA KASIH
        const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRyJ4VihwGxpbpxQfSDKMb5AiPVmY1-wFviOWyEjfsuljcLPXUypWMNVDakdmM-58m31gNBNydwGSEe/pub?output=csv";
        let rawData = [];
        let state = { mapel: '', kelas: '' };

        async function init() {
            try {
                const res = await fetch(csvUrl);
                const text = await res.text();
                // Parse CSV sederhana (Asumsi pemisah koma)
                const rows = text.split('\n').slice(1);
                rawData = rows.map(row => {
                    const c = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/); // Regex agar koma di dalam teks tidak pecah
                    return { 
                        kelas: c[0]?.replace(/"/g, '').trim(), 
                        mapel: c[1]?.replace(/"/g, '').trim(), 
                        smt: c[2]?.replace(/"/g, '').trim(), 
                        judul: c[3]?.replace(/"/g, '').trim(), 
                        link: c[4]?.replace(/"/g, '').trim(), 
                        desc: c[5]?.replace(/"/g, '').trim() 
                    };
                }).filter(x => x.judul);
                document.getElementById('marquee').innerText = "Koneksi Berhasil. Data siap diakses.";
            } catch (e) {
                document.getElementById('marquee').innerText = "Gagal memuat data. Periksa koneksi.";
            }
        }

        function chooseMapel(m) { state.mapel = m; document.getElementById('header-mapel').innerText = m; nav(2); }
        function setKelas(k) { state.kelas = k; nav(3); }
        function nav(s) { 
            document.querySelectorAll('.section').forEach(x => x.classList.remove('active'));
            document.getElementById('step-' + s).classList.add('active');
            window.scrollTo(0,0);
        }

        function render(s) {
            const grid = document.getElementById('display-grid');
            const filtered = rawData.filter(d => d.mapel === state.mapel && d.kelas === state.kelas && d.smt === s);
            grid.innerHTML = filtered.length ? '' : '<p>Belum ada data di kategori ini.</p>';
            
            filtered.forEach((item, idx) => {
                const imgs = item.link.split(',').map(l => l.trim());
                let sliderHtml = `<div class="slider-container">`;
                if(imgs.length > 1) {
                    sliderHtml += `<button class="slider-btn" style="left:10px" onclick="move(${idx},-1)">❮</button>
                                   <button class="slider-btn" style="right:10px" onclick="move(${idx},1)">❯</button>
                                   <div class="img-counter"><span id="c-${idx}">1</span>/${imgs.length}</div>`;
                }
                sliderHtml += `<div class="slider-wrapper" id="sw-${idx}">`;
                imgs.forEach(url => { sliderHtml += `<img src="${url}" onerror="this.src='https://via.placeholder.com/400x220?text=Error+Image'">`; });
                sliderHtml += `</div></div>`;

                grid.innerHTML += `
                    <div class="card">
                        ${sliderHtml}
                        <div class="card-body">
                            <b>${item.judul}</b>
                            <p style="font-size:0.85rem; color:#555; margin:0;">${item.desc}</p>
                        </div>
                    </div>`;
            });
            nav(4);
        }

        let slidePos = {};
        function move(idx, dir) {
            const el = document.getElementById(`sw-${idx}`);
            const total = el.querySelectorAll('img').length;
            slidePos[idx] = ((slidePos[idx] || 0) + dir + total) % total;
            el.style.transform = `translateX(-${slidePos[idx] * 100}%)`;
            document.getElementById(`c-${idx}`).innerText = slidePos[idx] + 1;
        }

        function toggleModal(s) { document.getElementById('fb-modal').style.display = s ? 'flex' : 'none'; }

        function sendFeedback() {
            const name = document.getElementById('nama').value;
            const msg = document.getElementById('pesan').value;
            if(!name || !msg) return alert("Mohon lengkapi form.");

            const fID = "1FAIpQLSdrFxIC2b4ov1k5mJye8CVpKN4IsVP5RI1XQv-sAsO2pJ_pFQ";
            const url = `https://docs.google.com/forms/d/e/${fID}/formResponse?entry.1364991538=${encodeURIComponent(name)}&entry.1865279409=${encodeURIComponent(msg)}&submit=Submit`;

            document.getElementById('btn-submit').innerText = "Mengirim...";
            fetch(url, { mode: 'no-cors' }).then(() => {
                alert("Terima kasih atas masukannya!");
                toggleModal(false);
                document.getElementById('nama').value = "";
                document.getElementById('pesan').value = "";
                document.getElementById('btn-submit').innerText = "Kirim Masukan";
            });
        }

        window.onload = init;
    </script>
</body>
</html>

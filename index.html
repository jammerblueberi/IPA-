<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPA | Archive System</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #7e57c2; 
            --accent: #26a69a; 
            --bg: #fdfbff; 
            --text: #2c3e50; 
        }

        * { box-sizing: border-box; transition: all 0.3s ease; }
        body { 
            margin: 0; 
            font-family: 'Quicksand', sans-serif; 
            background: linear-gradient(135deg, #f3e5f5 0%, #e0f2f1 100%); 
            color: var(--text); 
            min-height: 100vh;
        }

        /* --- MARQUEE --- */
        .marquee-wrapper {
            width: 100%; background: rgba(126, 87, 194, 0.85); color: white; padding: 10px 0; overflow: hidden;
        }
        .marquee-text { display: inline-block; white-space: nowrap; animation: scroll-text 25s linear infinite; font-weight: 600; }
        @keyframes scroll-text { 0% { transform: translateX(100vw); } 100% { transform: translateX(-100%); } }

        /* --- LAYOUT --- */
        .section { min-height: 100vh; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }
        .active { display: flex; animation: fadeIn 0.6s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .btn-grid { display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; }
        .nav-btn { 
            padding: 16px 32px; border: 2px solid var(--accent); border-radius: 16px; 
            background: white; color: var(--text); font-weight: 700; cursor: pointer;
        }
        .nav-btn:hover { background: var(--accent); color: white; transform: translateY(-3px); }

        /* --- CAROUSEL --- */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; width: 100%; max-width: 1100px; padding: 20px; }
        .card { 
            background: rgba(255, 255, 255, 0.8); border-radius: 24px; overflow: hidden; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.06); backdrop-filter: blur(12px);
        }
        .slider-container { position: relative; width: 100%; height: 230px; overflow: hidden; }
        .slider-wrapper { display: flex; transition: transform 0.5s ease; height: 100%; }
        .slider-wrapper img { width: 100%; height: 100%; object-fit: cover; flex-shrink: 0; cursor: pointer; }
        
        .slider-btn { 
            position: absolute; top: 50%; transform: translateY(-50%); 
            background: rgba(255,255,255,0.8); border: none; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; z-index: 5;
        }
        .img-counter { position: absolute; bottom: 10px; right: 10px; background: rgba(0,0,0,0.5); color: white; padding: 3px 10px; border-radius: 12px; font-size: 0.7rem; }

        /* --- FULLSCREEN ZOOM --- */
        #zoom-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none;
            justify-content: center; align-items: center; z-index: 9999; cursor: zoom-out;
        }
        #zoom-img { max-width: 95%; max-height: 95%; border-radius: 10px; transform: scale(1); transition: 0.3s; }

        /* --- FAB AURA --- */
        .fab { 
            position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px; 
            background: var(--primary); color: white; border-radius: 50%; display: flex; 
            align-items: center; justify-content: center; cursor: pointer; z-index: 1000; border: none;
            animation: blinking-aura 2s infinite; font-size: 24px;
        }
        @keyframes blinking-aura {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(126, 87, 194, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 15px rgba(126, 87, 194, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(126, 87, 194, 0); }
        }

        .modal { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; 
            justify-content: center; align-items: center; z-index: 2000; backdrop-filter: blur(6px);
        }
        .modal-box { background: white; padding: 30px; border-radius: 28px; width: 90%; max-width: 400px; }
        .modal-box input, .modal-box textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #eee; border-radius: 12px; outline: none; }
    </style>
</head>
<body>

    <audio id="music-pasilyo" src="pasilyo.mp3" loop></audio>

    <div id="zoom-overlay" onclick="closeZoom()">
        <img id="zoom-img" src="" alt="Full Screen">
    </div>

    <div class="marquee-wrapper">
        <div class="marquee-text" id="marquee">Selamat datang di sistem arsip IPA. Silakan pilih kategori penelitian.</div>
    </div>

    <section id="step-1" class="section active">
        <h1 style="color:var(--primary)">Arsip Penelitian IPA</h1>
        <div class="btn-grid">
            <button class="nav-btn" onclick="chooseMapel('Biologi')">🧬 Biologi</button>
            <button class="nav-btn" onclick="chooseMapel('Fisika')">⚡ Fisika</button>
            <button class="nav-btn" onclick="chooseMapel('Kimia')">🧪 Kimia</button>
        </div>
    </section>

    <section id="step-2" class="section">
        <h1 id="header-mapel" style="color:var(--primary)">Pilih Tingkatan</h1>
        <div class="btn-grid">
            <button class="nav-btn" onclick="setKelas('10')">Level 10</button>
            <button class="nav-btn" onclick="setKelas('11')">Level 11</button>
            <button class="nav-btn" onclick="setKelas('12')">Level 12</button>
        </div>
    </section>

    <section id="step-3" class="section">
        <h1 style="color:var(--primary)">Pilih Semester</h1>
        <div class="btn-grid">
            <button class="nav-btn" onclick="render('1')">Semester 1</button>
            <button class="nav-btn" onclick="render('2')">Semester 2</button>
        </div>
    </section>

    <section id="step-4" class="section" style="justify-content: flex-start;">
        <h1 id="header-final" style="margin-top: 40px; color:var(--primary)">Arsip Data</h1>
        <div class="grid" id="display-grid"></div>
        <button class="nav-btn" onclick="location.reload()" style="margin:40px 0;">Kembali ke Awal</button>
    </section>

    <button class="fab" onclick="toggleModal(true)">💬</button>

    <div id="fb-modal" class="modal">
        <div class="modal-box">
            <h3 style="color:var(--primary)">Saran & Masukan</h3>
            <input type="text" id="nama" placeholder="Nama Lengkap">
            <textarea id="pesan" rows="4" placeholder="Masukan Anda..."></textarea>
            <button onclick="sendFeedback()" id="btn-submit" style="width:100%; padding:14px; background:var(--primary); color:white; border:none; border-radius:12px; cursor:pointer;">Kirim</button>
            <center><p onclick="toggleModal(false)" style="color:red; cursor:pointer; margin-top:15px;">Tutup</p></center>
        </div>
    </div>

    <script>
        const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRyJ4VihwGxpbpxQfSDKMb5AiPVmY1-wFviOWyEjfsuljcLPXUypWMNVDakdmM-58m31gNBNydwGSEe/pub?output=csv";
        let rawData = [];
        let state = { mapel: '', kelas: '' };
        const myMusic = document.getElementById('music-pasilyo');

        async function init() {
            try {
                const res = await fetch(csvUrl);
                const text = await res.text();
                const rows = text.split('\n').slice(1);
                rawData = rows.map(row => {
                    const c = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    return { 
                        kelas: c[0]?.replace(/"/g, '').trim(), 
                        mapel: c[1]?.replace(/"/g, '').trim(), 
                        smt: c[2]?.replace(/"/g, '').trim(), 
                        judul: c[3]?.replace(/"/g, '').trim(), 
                        link: c[4]?.replace(/"/g, '').trim(), 
                        desc: c[5]?.replace(/"/g, '').trim() 
                    };
                }).filter(x => x.judul);
                document.getElementById('marquee').innerText = "Data berhasil dimuat. Pilih kategori untuk memulai.";
            } catch (e) { document.getElementById('marquee').innerText = "Database Offline."; }
        }

        function chooseMapel(m) { state.mapel = m; document.getElementById('header-mapel').innerText = m; nav(2); }
        
        // MUSIK DIMULAI DISINI
        function setKelas(k) { 
            state.kelas = k; 
            myMusic.volume = 0.4;
            myMusic.play().catch(e => console.log("User must interact first")); 
            nav(3); 
        }

        function nav(s) { 
            document.querySelectorAll('.section').forEach(x => x.classList.remove('active'));
            document.getElementById('step-' + s).classList.add('active');
            window.scrollTo(0,0);
        }

        function render(s) {
            const grid = document.getElementById('display-grid');
            const filtered = rawData.filter(d => d.mapel === state.mapel && d.kelas === state.kelas && d.smt === s);
            grid.innerHTML = filtered.length ? '' : '<p>Data kosong.</p>';
            
            filtered.forEach((item, idx) => {
                const imgs = item.link.split(',').map(l => l.trim());
                let sliderHtml = `<div class="slider-container">`;
                if(imgs.length > 1) {
                    sliderHtml += `<button class="slider-btn" style="left:5px" onclick="move(${idx},-1)">❮</button>
                                   <button class="slider-btn" style="right:5px" onclick="move(${idx},1)">❯</button>
                                   <div class="img-counter"><span id="c-${idx}">1</span>/${imgs.length}</div>`;
                }
                sliderHtml += `<div class="slider-wrapper" id="sw-${idx}">`;
                imgs.forEach(url => { 
                    sliderHtml += `<img src="${url}" onclick="openZoom('${url}')" onerror="this.src='https://via.placeholder.com/400x230?text=Error'">`; 
                });
                sliderHtml += `</div></div>`;

                grid.innerHTML += `
                    <div class="card">${sliderHtml}<div class="card-body"><b>${item.judul}</b><p style="font-size:0.85rem">${item.desc}</p></div></div>`;
            });
            nav(4);
        }

        let slidePos = {};
        function move(idx, dir) {
            const el = document.getElementById(`sw-${idx}`);
            const total = el.querySelectorAll('img').length;
            slidePos[idx] = ((slidePos[idx] || 0) + dir + total) % total;
            el.style.transform = `translateX(-${slidePos[idx] * 100}%)`;
            document.getElementById(`c-${idx}`).innerText = slidePos[idx] + 1;
        }

        // ZOOM FUNCTIONS
        function openZoom(src) {
            const overlay = document.getElementById('zoom-overlay');
            const img = document.getElementById('zoom-img');
            img.src = src;
            overlay.style.display = 'flex';
        }
        function closeZoom() { document.getElementById('zoom-overlay').style.display = 'none'; }

        function toggleModal(s) { document.getElementById('fb-modal').style.display = s ? 'flex' : 'none'; }

        function sendFeedback() {
            const name = document.getElementById('nama').value;
            const msg = document.getElementById('pesan').value;
            const url = `https://docs.google.com/forms/d/e/1FAIpQLSdrFxIC2b4ov1k5mJye8CVpKN4IsVP5RI1XQv-sAsO2pJ_pFQ/formResponse?entry.1364991538=${encodeURIComponent(name)}&entry.1865279409=${encodeURIComponent(msg)}&submit=Submit`;
            fetch(url, { mode: 'no-cors' }).then(() => {
                alert("Terkirim!");
                toggleModal(false);
            });
        }

        window.onload = init;
    </script>
</body>
</html>

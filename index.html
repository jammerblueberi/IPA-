<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portofolio IPA | GitHub Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Caveat:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --ipa-green: #2d6a4f;
            --ipa-light: #d8f3dc;
            --ipa-accent: #52b788;
            --white: #ffffff;
        }

        body { margin: 0; font-family: 'Poppins', sans-serif; background: #f0f4f2; color: #333; }

        /* --- HEADER --- */
        .header { 
            background: linear-gradient(135deg, var(--ipa-green), var(--ipa-accent)); 
            color: white; padding: 50px 20px; text-align: center;
        }
        .header h1 { font-family: 'Caveat', cursive; font-size: 3.5rem; margin: 0; }
        
        /* --- MULTI DROPDOWN BOX --- */
        .filter-container {
            max-width: 900px; margin: -30px auto 40px; background: white;
            padding: 25px; border-radius: 20px; display: flex; flex-wrap: wrap;
            gap: 15px; justify-content: center; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .filter-group { display: flex; flex-direction: column; gap: 5px; }
        .filter-group label { font-size: 0.7rem; font-weight: bold; color: var(--ipa-green); margin-left: 5px; }
        
        select {
            padding: 12px 20px; border-radius: 12px; border: 2px solid var(--ipa-light);
            font-family: 'Poppins', sans-serif; font-weight: 600; color: var(--ipa-green);
            outline: none; min-width: 180px; transition: 0.3s;
        }
        select:focus { border-color: var(--ipa-accent); }

        /* --- CONTENT SECTION --- */
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px 50px; }
        .section-title { 
            font-family: 'Caveat', cursive; font-size: 2.5rem; 
            color: var(--ipa-green); text-align: center; margin-bottom: 30px; 
        }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; }
        .card { 
            background: white; border-radius: 20px; overflow: hidden; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.05); transition: 0.3s;
        }
        .card:hover { transform: translateY(-10px); }
        .card img { width: 100%; height: 200px; object-fit: cover; }
        .card-body { padding: 20px; }
        .card-title { font-family: 'Caveat', cursive; font-size: 1.8rem; color: var(--ipa-green); margin: 5px 0; }
        .badge { background: var(--ipa-light); color: var(--ipa-green); padding: 4px 10px; border-radius: 8px; font-size: 0.7rem; font-weight: bold; }

        #no-data { text-align: center; padding: 50px; display: none; color: #888; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Sains & Eksplorasi</h1>
        <p>Dokumentasi Tugas Mata Pelajaran IPA</p>
    </div>

    <div class="filter-container">
        <div class="filter-group">
            <label>MATA PELAJARAN</label>
            <select id="fMapel" onchange="applyFilter()">
                <option value="Biologi">Biologi</option>
                <option value="Fisika">Fisika</option>
                <option value="Kimia">Kimia</option>
            </select>
        </div>
        <div class="filter-group">
            <label>KELAS</label>
            <select id="fKelas" onchange="applyFilter()">
                <option value="10">Kelas 10</option>
                <option value="11">Kelas 11</option>
                <option value="12">Kelas 12</option>
            </select>
        </div>
        <div class="filter-group">
            <label>SEMESTER</label>
            <select id="fSmt" onchange="applyFilter()">
                <option value="1">Semester 1</option>
                <option value="2">Semester 2</option>
            </select>
        </div>
    </div>

    <div class="container">
        <h2 id="display-title" class="section-title">Hasil Penelusuran</h2>
        <div class="grid" id="gallery"></div>
        <div id="no-data">Belum ada dokumentasi untuk kategori ini.</div>
    </div>

    <script>
        const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRyJ4VihwGxpbpxQfSDKMb5AiPVmY1-wFviOWyEjfsuljcLPXUypWMNVDakdmM-58m31gNBNydwGSEe/pub?output=csv";
        let rawData = [];

        async function init() {
            try {
                const res = await fetch(csvUrl);
                const text = await res.text();
                const rows = text.split('\n').slice(1);
                
                rawData = rows.map(row => {
                    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    return {
                        kelas: cols[0]?.replace(/"/g, "").trim(),
                        mapel: cols[1]?.replace(/"/g, "").trim(),
                        smt: cols[2]?.replace(/"/g, "").trim(),
                        judul: cols[3]?.replace(/"/g, "").trim(),
                        link: cols[4]?.replace(/"/g, "").trim(),
                        desc: cols[5]?.replace(/"/g, "").trim()
                    };
                }).filter(r => r.judul);
                
                applyFilter();
            } catch (err) { console.error(err); }
        }

        function applyFilter() {
            const m = document.getElementById('fMapel').value;
            const k = document.getElementById('fKelas').value;
            const s = document.getElementById('fSmt').value;
            
            // Update Judul Halaman
            document.getElementById('display-title').innerText = `${m} - Kelas ${k}`;

            const filtered = rawData.filter(d => d.mapel === m && d.kelas === k && d.smt === s);
            render(filtered);
        }

        function render(items) {
            const container = document.getElementById('gallery');
            const empty = document.getElementById('no-data');
            container.innerHTML = '';
            
            if(items.length === 0) {
                empty.style.display = 'block';
                return;
            }
            
            empty.style.display = 'none';
            items.forEach(item => {
                container.innerHTML += `
                    <div class="card">
                        <img src="${item.link}" onerror="this.src='https://via.placeholder.com/400x250?text=IPA+Project'">
                        <div class="card-body">
                            <span class="badge">Semester ${item.smt}</span>
                            <div class="card-title">${item.judul}</div>
                            <p style="font-size:0.85rem; color:#666;">${item.desc}</p>
                        </div>
                    </div>`;
            });
        }

        window.onload = init;
    </script>
</body>
</html>
